<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة قواعد الإنجليزية - تانية باك</title>
    <link rel="stylesheet" href="./style.css">
 
</head>

<body>

    <div class="container">
        <header>
            <h1>دفتر القواعد التفاعلي الذكي 📓</h1>
            <p>نظام رقمي متكامل لحفظ، تعديل، وطباعة قواعد الإنجليزية لتانية باك</p>
        </header>

        <section class="form-section">
            <h2 id="formHeader">➕ إضافة قاعدة جديدة للكشكول</h2>
            <form id="grammarForm">
                <input type="hidden" id="editIndex" value="">
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 250px;">
                        <label for="ruleName">اسم القاعدة / الزمن</label>
                        <input type="text" id="ruleName" placeholder="مثال: Present Perfect" required>
                    </div>
                    <div style="flex: 1; min-width: 250px;">
                        <label for="ruleStructure">التكوين الهيكلي (Form)</label>
                        <input type="text" id="ruleStructure" placeholder="مثال: S + have/has + P.P" required
                            style="direction: ltr;">
                    </div>
                </div>

                <div style="margin-top: 15px;">
                    <label for="ruleUsage">الاستخدام</label>
                    <textarea id="ruleUsage" placeholder="متى نستخدم هذه القاعدة..." required></textarea>
                </div>

                <div style="margin-top: 15px;">
                    <label for="keyWords">الكلمات الدالة (افصل بينها بفاصلة , )</label>
                    <input type="text" id="keyWords" placeholder="since, for, already, yet">
                </div>

                <div style="margin-top: 15px;">
                    <label for="examples">أمثلة تطبيقية (كل مثال في سطر منفصل)</label>
                    <textarea id="examples" placeholder="اكتب الأمثلة هنا..." required
                        style="direction: ltr; text-align: left;"></textarea>
                </div>

                <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px;">
                    <div style="flex: 1; min-width: 250px;">
                        <label for="negQuestion">النفي والسؤال</label>
                        <textarea id="negQuestion" placeholder="صيغة النفي وصناعة السؤال..."></textarea>
                    </div>
                    <div style="flex: 1; min-width: 250px;">
                        <label for="tricks">⚠️ التريكات وملاحظات الامتحانات المهمة</label>
                        <textarea id="tricks" placeholder="ملاحظات المستر الهامة..."></textarea>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">حفظ القاعدة في الكشكول 🚀</button>
            </form>
        </section>

        <h2 class="notebook-title">📋 تصفح كشكول القواعد الخاص بك</h2>
        <div id="rulesContainer" class="rules-container"></div>
    </div>

    <script src="./script.js">
       
    </script>
</body>

</html>
